<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tinku Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>L. Tinkeshwari</h1>
        <img src="../images/myphoto.jpg" alt="My Photo" class="profile-photo">
        <p>BCA Semester 2 Student | Web Developer</p>
    </header>

    <section class="about">
        <h2>About Me</h2>
        <p>Hello! I'm Tinku. I am a passionate web developer and BCA student. Welcome to my portfolio.</p>
    </section>

    <section class="certificates">
        <h2>Certificates</h2>
        <div class="buttons">
            <button onclick="showCertificate('css3')">CSS3</button>
            <button onclick="showCertificate('html5')">HTML5</button>
            <button onclick="showCertificate('javascript')">JavaScript</button>
            <button onclick="showCertificate('github')">GitHub</button>
            <button onclick="showCertificate('mongodb')">MongoDB</button>
            <button onclick="showCertificate('nodejs')">Node.js</button>
            <button onclick="showCertificate('digital-engineering')">Digital Engineering</button>
        </div>
        <div id="certificate-display">
            <img id="certificate-img" src="" alt="Certificate" style="display:none;">
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
