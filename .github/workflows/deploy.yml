name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pin to a commit SHA if required by your repository settings
          # ref: <commit-sha>  # optional

      # Step 2: Set up Node.js (if you need build tools)
      - name: Set up Node.js
        uses: actions/setup-node@v9
        with:
          node-version: '18'

      # Step 3: Install dependencies (if any)
      - name: Install dependencies
        run: npm install

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # root folder where your index.html lives